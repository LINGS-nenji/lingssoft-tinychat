services:
  # 1. 초경량 실시간 채팅 코어 및 DB (PocketBase)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: LINGS-chat-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    networks:
      - chat-network

  # 2. AI 비즈니스 로직 및 챗봇 엔진 (Python FastAPI)
  fastapi-ai:
    build:
      context: ./pb_chatbot
      dockerfile: Dockerfile
    container_name: LINGS-chat-fastapi-ai
    restart: unless-stopped
    ports:
      - "${FASTAPI_HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./pb_chatbot:/app
      - ./chroma_data:/data/chroma
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - AI_MODEL_URL=${AI_MODEL_URL:-}
      - AI_MODEL_TIMEOUT=${AI_MODEL_TIMEOUT:-30}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_SYSTEM_PROMPT=${LLM_SYSTEM_PROMPT:-You are a helpful assistant for a lightweight PocketBase chat application.}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - BOT_USER_ID=${BOT_USER_ID:-bot_user_id_placeholder}
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-/data/chroma}
      - PORT=${PORT:-8000}
    depends_on:
      - pocketbase
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge
