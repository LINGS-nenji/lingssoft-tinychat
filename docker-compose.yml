version: "3.8"

services:
  # 1. 초경량 실시간 채팅 코어 및 DB (PocketBase)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: LINGS-chat-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
    networks:
      - chat-network

  # 2. AI 비즈니스 로직 및 챗봇 엔진 (Python FastAPI)
  fastapi-ai:
    image: python:3.11-slim
    container_name: LINGS-chat-fastapi-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./pd_chatbot:/app
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir fastapi uvicorn requests httpx && 
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge
